<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div id="deck-content">
      <card>
        <card-title>Question</card-title>
        <card-content>Hello</card-content>
      </card>

      <card class="card-hidden">
        <card-title>
          Answer
        </card-title>
        <card-content>
          ---
        </card-content>
      </card>

      <card class="card-show-from-hidden">
        <card-title>
          Answer (revealed)
        </card-title>
        <card-content>
          used as a greeting or to begin a telephone conversation.
        </card-content>
      </card>
    </div>
  </body>

</html>
